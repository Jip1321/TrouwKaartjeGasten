<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trouwkaart</title>


<meta property="og:title" content="Trouwkaart">
<meta property="og:description" content="Uitnodiging Daggasten. Klik om door onze kaart te bladeren">
<meta property="og:image" content="https://bruiloft-emiel-femke.pages.dev/banaan.jpeg">
<meta property="og:url" content="https://bruiloft-emiel-femke.pages.dev">
<meta name="twitter:card" content="summary_large_image">

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #e6e6e6;
        font-family: sans-serif;
        overflow: hidden;
    }

    #card {
        width: min(70vh, 90vw);
        max-width: 95%;
        aspect-ratio: 3 / 4;
        position: relative;
    }

    #card img {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: contain; 
        object-position: center 30%;
        background: #e6e6e6; 
        opacity: 0;
        transition: opacity 0.8s ease;
        
    }

    #card img.active {
        opacity: 1;
    }

    .hint {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: #444;
        font-size: 16px;
        pointer-events: none;
    }
</style>
</head>

<body>

<div id="card">
    <img src="banaan.jpeg" class="active">
    <img src="tomaat.jpeg">
    <img src="druif.jpeg">
    <img src="kers.jpeg">
</div>

<div class="hint">Uitnodiging daggasten bruiloft Emiel & Femke, tik op de afbeelding om door de uitnodiging te bladeren</div>

<script>
    const images = document.querySelectorAll("#card img");
    let index = 0;

    document.addEventListener("click", () => {
        images[index].classList.remove("active");
        index = (index + 1) % images.length;
        images[index].classList.add("active");
    });
</script>

</body>
</html>
